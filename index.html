<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La mia Cantina">
<meta name="theme-color" content="#1a0a0a">
<title>La mia Cantina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a0a0a; --paper:#f7f2ec; --paper2:#ede6da; --paper3:#e3d9c8;
  --wine:#6b1a2a; --wine-light:#9b3a4f; --wine-pale:#f0e0e4;
  --gold:#b8922a; --gold-light:#d4ad50; --muted:#7a6a5a;
  --border:rgba(107,26,42,0.15); --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--ink);color:var(--ink);font-size:16px;line-height:1.5}

/* LOCK */
#lock-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:2rem}
.lock-icon{font-size:52px;margin-bottom:1.5rem}
.lock-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--paper);margin-bottom:.4rem}
.lock-subtitle{font-size:14px;color:rgba(247,242,236,.45);margin-bottom:2rem}
.lock-input{width:100%;max-width:280px;padding:13px 16px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(255,255,255,.07);color:var(--paper);font-family:'Crimson Pro',serif;font-size:18px;text-align:center;letter-spacing:.2em;margin-bottom:1rem}
.lock-input:focus{outline:none;border-color:var(--gold-light)}
.lock-btn{width:100%;max-width:280px;padding:13px;background:var(--wine);color:var(--paper);border:none;border-radius:10px;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;cursor:pointer}
.lock-error{font-size:13px;color:#e57373;margin-top:.75rem;min-height:20px}
.lock-hint{font-size:12px;color:rgba(247,242,236,.25);margin-top:1.5rem;text-align:center}

/* APP SHELL */
#app{height:100dvh;display:flex;flex-direction:column;background:var(--paper);max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* HEADER */
.header{background:var(--ink);color:var(--paper);padding:1rem 1.25rem .85rem;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.app-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:.02em}
.app-title em{color:var(--gold-light);font-style:normal}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#666;display:inline-block;margin-left:8px;vertical-align:middle;transition:background .3s}
.sync-dot.online{background:#4caf50}
.sync-dot.syncing{background:var(--gold-light);animation:pulse 1s infinite}
.sync-dot.error{background:#e53935}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--paper);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.stats-row{display:flex;border-top:1px solid rgba(255,255,255,.1);padding-top:.7rem}
.stat{flex:1;text-align:center;padding:0 .5rem;border-right:1px solid rgba(255,255,255,.1)}
.stat:last-child{border-right:none}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold-light);line-height:1}
.stat-label{font-size:10px;color:rgba(247,242,236,.5);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

/* TABS */
.tabs{display:flex;background:var(--ink);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.tab{flex:1;padding:.65rem;text-align:center;font-size:13px;color:rgba(247,242,236,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--gold-light);border-bottom-color:var(--gold-light)}

/* TOOLBAR — fixed, never re-rendered */
.toolbar{background:var(--paper2);padding:.6rem 1rem;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{flex:1;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#search-input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border);border-radius:20px;background:var(--paper);font-family:'Crimson Pro',serif;font-size:15px;color:var(--ink)}
#search-input:focus{outline:none;border-color:var(--wine-light)}
#type-filter{padding:7px 10px;border:1px solid var(--border);border-radius:20px;background:var(--paper);font-family:'Crimson Pro',serif;font-size:14px;color:var(--ink);cursor:pointer;max-width:110px}
#type-filter:focus{outline:none}
.view-toggle{display:flex;gap:4px}
.vbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .15s}
.vbtn.active{background:var(--wine);color:var(--paper);border-color:var(--wine)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem}

/* CARDS */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wine-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.wine-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--type-color,var(--wine))}
.wine-card:active{transform:scale(.97)}
.card-badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.card-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;line-height:1.2;color:var(--ink);margin-bottom:2px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:8px}
.card-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:6px;margin-top:6px;font-size:12px;color:var(--muted)}

/* LIST */
.wine-list{display:flex;flex-direction:column;gap:8px}
.list-item{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.list-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--type-color,var(--wine))}
.list-item:active{transform:scale(.98)}
.list-icon{width:40px;height:40px;border-radius:50%;background:var(--paper2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.list-main{flex:1;min-width:0}
.list-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-sub{font-size:13px;color:var(--muted)}
.list-right{text-align:right;flex-shrink:0}
.consumed-date{font-size:11px;color:var(--muted);margin-top:2px}

/* FAB */
.fab{position:absolute;bottom:1.25rem;right:1.25rem;width:54px;height:54px;border-radius:50%;background:var(--wine);color:var(--paper);border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(107,26,42,.4);z-index:10}
.fab:active{transform:scale(.92)}

/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-icon{font-size:56px;margin-bottom:1rem;opacity:.5}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--ink);margin-bottom:.5rem}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(26,10,10,.6);z-index:50;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}}
.sheet{background:var(--paper);border-radius:20px 20px 0 0;max-height:92dvh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}}
.sheet-handle{width:36px;height:4px;background:var(--paper3);border-radius:2px;margin:10px auto 0}
.sheet-header{padding:1rem 1.25rem .75rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sheet-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
.close-btn{width:30px;height:30px;border-radius:50%;background:var(--paper2);border:none;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.sheet-body{padding:1rem 1.25rem 2rem}

/* FORM */
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--paper2);font-family:'Crimson Pro',serif;font-size:16px;color:var(--ink);appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--wine-light);background:var(--paper)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TYPE PILLS */
.type-pills{display:flex;flex-wrap:wrap;gap:6px}
.type-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--paper2);font-family:'Crimson Pro',serif;font-size:14px;cursor:pointer;transition:all .15s;color:var(--ink)}
.type-pill.sel{background:var(--wine);color:var(--paper);border-color:var(--wine)}

/* STARS — persistent container, only inner HTML updates */
#star-container{display:flex;gap:6px;padding:4px 0}
.s-star{font-size:30px;cursor:pointer;color:var(--paper3);transition:color .1s;user-select:none;line-height:1}
.s-star.lit{color:var(--gold)}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:1.25rem}
.btn{flex:1;padding:12px 6px;border-radius:10px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--wine);color:var(--paper)}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-danger{background:transparent;color:#b33;border-color:rgba(180,0,0,.2)}
.btn-drink{background:transparent;color:var(--gold);border-color:rgba(184,146,42,.3)}

/* DETAIL */
.detail-hero{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.detail-icon{width:60px;height:60px;border-radius:50%;background:var(--wine-pale);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;line-height:1.2;margin-bottom:3px}
.detail-producer{font-size:15px;color:var(--muted)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.chip{background:var(--paper2);border-radius:8px;padding:.6rem .8rem}
.chip-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
.chip-val{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.detail-section{margin-bottom:1rem}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.detail-text{background:var(--paper2);border-radius:8px;padding:.75rem .9rem;font-size:15px;line-height:1.6}
.history-item{background:var(--paper2);border-radius:8px;padding:.7rem .9rem;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.history-date{font-size:13px;color:var(--muted)}
.history-qty{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--wine)}

/* MENU */
.menu-overlay{position:fixed;inset:0;background:rgba(26,10,10,.5);z-index:60;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .15s ease}
.menu-sheet{background:var(--paper);border-radius:20px 20px 0 0;padding:1rem 1.25rem 2rem;animation:slideUp .2s ease}
.menu-title{font-family:'Cormorant Garamond',serif;font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:center;margin-bottom:1rem}
.menu-item{display:flex;align-items:center;gap:12px;padding:.85rem .5rem;border-bottom:1px solid var(--border);cursor:pointer;font-size:17px;color:var(--ink)}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:var(--paper2);border-radius:8px}
.menu-icon{font-size:20px;width:28px;text-align:center}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;animation:toastIn .2s ease,toastOut .3s ease 2.2s forwards;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
@keyframes toastOut{to{opacity:0}}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-icon">🍷</div>
  <div class="lock-title">La mia Cantina</div>
  <div class="lock-subtitle">Inserisci la password per accedere</div>
  <input class="lock-input" type="password" id="lock-pwd" placeholder="••••••">
  <button class="lock-btn" id="lock-submit">Entra</button>
  <div class="lock-error" id="lock-err"></div>
  <div class="lock-hint">Password predefinita: <strong style="color:rgba(255,255,255,.4)">cantina</strong></div>
</div>

<div id="app" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── FIREBASE ────────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey:"AIzaSyCS2TOh-IRFlW-kINdXkfSvftx5wYWnwrc",
  authDomain:"cantina-andrea.firebaseapp.com",
  databaseURL:"https://cantina-andrea-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"cantina-andrea",
  storageBucket:"cantina-andrea.firebasestorage.app",
  messagingSenderId:"372812766335",
  appId:"1:372812766335:web:dad2b9643e88770dacf34a"
});
const db = getDatabase(fbApp);
const winesRef  = ref(db,'wines');
const consumedRef = ref(db,'consumed');

// ─── PASSWORD ────────────────────────────────────────────────
function hash(s){ let h=0; for(const c of s) h=(Math.imul(31,h)+c.charCodeAt(0))|0; return String(h); }
let pwdHash = localStorage.getItem('cpwdh') || hash('cantina');

function checkPwd(){
  const v = document.getElementById('lock-pwd').value;
  if(hash(v)===pwdHash){
    sessionStorage.setItem('cauth','1');
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('app').style.display='';
    init();
  } else {
    document.getElementById('lock-err').textContent='Password errata. Riprova.';
    document.getElementById('lock-pwd').value='';
  }
}
document.getElementById('lock-submit').addEventListener('click', checkPwd);
document.getElementById('lock-pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPwd(); });

function changePwd(){
  const np=prompt('Nuova password (min 4 caratteri):');
  if(!np||np.length<4){ showToast('Password troppo corta'); return; }
  if(np!==prompt('Ripeti la nuova password:')){ showToast('Le password non coincidono'); return; }
  pwdHash=hash(np); localStorage.setItem('cpwdh',pwdHash);
  showToast('Password aggiornata ✓'); closeOverlay();
}

if(sessionStorage.getItem('cauth')==='1'){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('app').style.display='';
}

// ─── CONSTANTS ───────────────────────────────────────────────
const TYPES=['Rosso','Bianco','Rosé','Bollicine','Passito','Altro'];
const ICONS={Rosso:'🍷',Bianco:'🥂',Rosé:'🌸',Bollicine:'🍾',Passito:'🍯',Altro:'🍶'};
const COLORS={Rosso:'#6b1a2a',Bianco:'#b8922a',Rosé:'#c45a7e',Bollicine:'#2a5a8b',Passito:'#4a7a2a',Altro:'#5a4a3a'};

// ─── STATE ───────────────────────────────────────────────────
let wines=[], consumed=[];
let view  = localStorage.getItem('cv')||'grid';
let activeTab = 'cantina';
let search='', filterType='';
let mode='list';
let editId=null, detailId=null, drinkId=null;
let formData={}, drinkData={};
let starRating=0;  // decoupled from render cycle
let syncStatus='syncing';

// ─── HELPERS ─────────────────────────────────────────────────
const fmtEur = n=>'€'+(n||0).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate = ts=>new Date(ts).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
const starsHtml = (n,sz=14)=>Array.from({length:5},(_,i)=>`<span style="color:${i<n?'#b8922a':'#d3c9b8'};font-size:${sz}px">★</span>`).join('');

function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}

function activeWines(){ return wines.filter(w=>(+w.bottles||0)>0); }
function totalBottles(){ return activeWines().reduce((s,w)=>s+(+w.bottles||0),0); }
function avgRating(){ const r=activeWines().filter(w=>w.rating>0); return r.length?(r.reduce((s,w)=>s+w.rating,0)/r.length).toFixed(1):'—'; }
function totalValue(){ return activeWines().reduce((s,w)=>s+(+w.price||0)*(+w.bottles||0),0); }

function filteredWines(){
  return wines.filter(w=>{
    if((+w.bottles||0)<=0) return false;
    const q=search.toLowerCase();
    return (!q||(w.name||'').toLowerCase().includes(q)||(w.producer||'').toLowerCase().includes(q)||(w.vintage||'').includes(q))
        && (!filterType||w.type===filterType);
  });
}
function filteredConsumed(){
  return consumed.filter(w=>{
    const q=search.toLowerCase();
    return (!q||(w.wineName||'').toLowerCase().includes(q)||(w.producer||'').toLowerCase().includes(q))
        && (!filterType||w.type===filterType);
  });
}

// ─── FIREBASE OPS ────────────────────────────────────────────
function setSyncDot(s){ syncStatus=s; const d=document.querySelector('.sync-dot'); if(d) d.className='sync-dot '+s; }

async function fbAdd(r,data){ setSyncDot('syncing'); await push(r,{...data,createdAt:Date.now()}); }
async function fbSet(path,data){ setSyncDot('syncing'); await set(ref(db,path),data); }
async function fbDel(path){ setSyncDot('syncing'); await remove(ref(db,path)); }

// ─── INIT + LISTENERS ────────────────────────────────────────
function init(){
  onValue(winesRef, snap=>{
    const d=snap.val();
    wines=d?Object.entries(d).map(([id,w])=>({...w,id})):[];
    wines.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    setSyncDot('online'); renderContent();
  }, ()=>{ setSyncDot('error'); showToast('Errore connessione'); });

  onValue(consumedRef, snap=>{
    const d=snap.val();
    consumed=d?Object.entries(d).map(([id,c])=>({...c,id})):[];
    consumed.sort((a,b)=>(b.date||0)-(a.date||0));
    renderContent();
  });

  buildShell();

  if(sessionStorage.getItem('cauth')==='1') renderContent();
}

if(sessionStorage.getItem('cauth')==='1') init();

// ─── SHELL (rendered once) ───────────────────────────────────
function buildShell(){
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="header-top">
        <div class="app-title">La mia <em>Cantina</em> <span class="sync-dot syncing"></span></div>
        <div class="header-actions">
          <button class="icon-btn" id="btn-menu">⋯</button>
          <button class="icon-btn" id="btn-add" style="display:none">+</button>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-val" id="s-wines">0</div><div class="stat-label">Vini</div></div>
        <div class="stat"><div class="stat-val" id="s-bottles">0</div><div class="stat-label">Bottiglie</div></div>
        <div class="stat"><div class="stat-val" id="s-rating">—</div><div class="stat-label">Rating</div></div>
        <div class="stat"><div class="stat-val" id="s-value">—</div><div class="stat-label">Valore</div></div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab-cantina">🍷 Cantina</div>
      <div class="tab" id="tab-bevuti">🥂 Bevuti</div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" placeholder="Cerca…">
      </div>
      <select id="type-filter">
        <option value="">Tutti</option>
        ${TYPES.map(t=>`<option value="${t}">${ICONS[t]} ${t}</option>`).join('')}
      </select>
      <div class="view-toggle" id="view-toggle">
        <button class="vbtn active" data-v="grid">⊞</button>
        <button class="vbtn" data-v="list">☰</button>
      </div>
    </div>
    <div id="content" class="content"></div>
    <button class="fab" id="btn-fab">+</button>
    <div id="overlay-root"></div>`;

  // persistent event listeners on stable elements
  document.getElementById('search-input').addEventListener('input', e=>{ search=e.target.value; renderContent(); });
  document.getElementById('type-filter').addEventListener('change', e=>{ filterType=e.target.value; renderContent(); });
  document.getElementById('view-toggle').addEventListener('click', e=>{
    const btn=e.target.closest('[data-v]'); if(!btn) return;
    view=btn.dataset.v; localStorage.setItem('cv',view);
    document.querySelectorAll('#view-toggle .vbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===view));
    renderContent();
  });
  document.getElementById('btn-add').addEventListener('click', openAdd);
  document.getElementById('btn-fab').addEventListener('click', openAdd);
  document.getElementById('btn-menu').addEventListener('click', openMenu);
  document.getElementById('tab-cantina').addEventListener('click', ()=>switchTab('cantina'));
  document.getElementById('tab-bevuti').addEventListener('click', ()=>switchTab('bevuti'));

  // set initial view toggle state
  document.querySelectorAll('#view-toggle .vbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===view));
}

// ─── CONTENT RENDERING ───────────────────────────────────────
function renderContent(){
  // stats
  document.getElementById('s-wines').textContent=activeWines().length;
  document.getElementById('s-bottles').textContent=totalBottles();
  document.getElementById('tab-cantina').textContent='🍷 Cantina ('+activeWines().length+')';
  document.getElementById('tab-bevuti').textContent='🥂 Bevuti ('+consumed.length+')';
  document.getElementById('s-rating').textContent=avgRating();
  const tv=totalValue(); document.getElementById('s-value').textContent=tv>0?fmtEur(tv):'—';

  // fab / add button visibility
  const showAdd=activeTab==='cantina';
  document.getElementById('btn-fab').style.display=showAdd?'':'none';
  document.getElementById('btn-add').style.display=showAdd?'':'none';

  // view toggle visibility
  document.getElementById('view-toggle').style.display=activeTab==='cantina'?'':'none';

  const el=document.getElementById('content'); if(!el) return;
  if(activeTab==='cantina'){
    const list=filteredWines();
    if(!list.length){ el.innerHTML=emptyHtml('🍷','La cantina è vuota','Aggiungi il tuo primo vino<br>premendo il + in alto'); return; }
    el.innerHTML=view==='grid'?gridHtml(list):listHtml(list);
    el.querySelectorAll('[data-wid]').forEach(card=>card.addEventListener('click',()=>openDetail(card.dataset.wid)));
  } else {
    const list=filteredConsumed();
    if(!list.length){ el.innerHTML=emptyHtml('🥂','Nessun vino bevuto','I vini che stappi appariranno qui'); return; }
    el.innerHTML=consumedListHtml(list);
    el.querySelectorAll('[data-cid]').forEach(card=>card.addEventListener('click',()=>openConsumedDetail(card.dataset.cid)));
  }
}

function emptyHtml(ic,t,p){ return `<div class="empty"><div class="empty-icon">${ic}</div><h3>${t}</h3><p>${p}</p></div>`; }

function gridHtml(list){
  return '<div class="grid">'+list.map(w=>`
    <div class="wine-card" data-wid="${w.id}" style="--type-color:${COLORS[w.type]||COLORS.Altro}">
      <div class="card-badge">${ICONS[w.type]||'🍶'} ${w.type}</div>
      <div class="card-name">${w.name}</div>
      <div class="card-sub">${w.producer||'—'}${w.vintage?' · '+w.vintage:''}</div>
      <div class="card-footer"><span>${starsHtml(w.rating,11)}</span><span>🍾 ${w.bottles}</span></div>
    </div>`).join('')+'</div>';
}

function listHtml(list){
  return '<div class="wine-list">'+list.map(w=>`
    <div class="list-item" data-wid="${w.id}" style="--type-color:${COLORS[w.type]||COLORS.Altro}">
      <div class="list-icon">${ICONS[w.type]||'🍶'}</div>
      <div class="list-main"><div class="list-name">${w.name}</div><div class="list-sub">${w.producer||'—'}${w.vintage?' · '+w.vintage:''}</div></div>
      <div class="list-right"><div style="font-size:12px;color:var(--gold)">${starsHtml(w.rating,12)}</div><div style="font-size:12px;color:var(--muted)">🍾 ${w.bottles}</div></div>
    </div>`).join('')+'</div>';
}

function consumedListHtml(list){
  return '<div class="wine-list">'+list.map(w=>`
    <div class="list-item" data-cid="${w.id}" style="--type-color:${COLORS[w.type]||COLORS.Altro}">
      <div class="list-icon">${ICONS[w.type]||'🍶'}</div>
      <div class="list-main">
        <div class="list-name">${w.wineName}</div>
        <div class="list-sub">${w.producer||'—'}${w.vintage?' · '+w.vintage:''}</div>
        <div class="consumed-date">${w.dateLabel||fmtDate(w.date)}</div>
      </div>
      <div class="list-right">
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--wine)">🥂 ${w.qty}</div>
        <div>${starsHtml(w.rating,11)}</div>
      </div>
    </div>`).join('')+'</div>';
}

// ─── NAVIGATION ──────────────────────────────────────────────
function switchTab(t){
  activeTab=t; search=''; filterType='';
  document.getElementById('search-input').value='';
  document.getElementById('type-filter').value='';
  document.getElementById('tab-cantina').classList.toggle('active',t==='cantina');
  document.getElementById('tab-bevuti').classList.toggle('active',t==='bevuti');
  renderContent();
}

function openAdd(){ formData={rating:0,type:'Rosso',bottles:1}; starRating=0; editId=null; showOverlay(formSheet()); attachFormEvents(); }
function openEdit(id){ const w=wines.find(x=>x.id===id); formData={...w}; starRating=w.rating||0; editId=id; showOverlay(formSheet()); attachFormEvents(); }
function openDetail(id){ detailId=id; showOverlay(detailSheet(id)); }
function openDrink(id){ drinkId=id; showOverlay(drinkSheet(id)); }
function openConsumedDetail(id){ showOverlay(consumedDetailSheet(id)); }
function openMenu(){ showOverlay(menuSheet(),true); }
function closeOverlay(){ document.getElementById('overlay-root').innerHTML=''; }

function showOverlay(html, isMenu=false){
  const root=document.getElementById('overlay-root');
  root.innerHTML=`<div class="${isMenu?'menu-overlay':'overlay'}" id="overlay-bg">${html}</div>`;
  root.querySelector('#overlay-bg').addEventListener('click', e=>{ if(e.target.id==='overlay-bg') closeOverlay(); });
}

// ─── STARS (stable DOM node, event delegation) ───────────────
function starsWidget(){
  return `<div id="star-container">${starButtons(starRating)}</div>`;
}
function starButtons(active){
  return Array.from({length:5},(_,i)=>`<span class="s-star${i<active?' lit':''}" data-star="${i+1}">★</span>`).join('');
}
function attachStarEvents(){
  const c=document.getElementById('star-container'); if(!c) return;
  c.addEventListener('mouseover', e=>{ const s=e.target.dataset.star; if(s){ c.innerHTML=starButtons(+s); } });
  c.addEventListener('mouseout', ()=>{ c.innerHTML=starButtons(starRating); });
  c.addEventListener('click', e=>{ const s=e.target.dataset.star; if(s){ starRating=+s; c.innerHTML=starButtons(starRating); } });
}

// ─── FORM ────────────────────────────────────────────────────
function formSheet(){
  return `<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">${editId?'Modifica vino':'Nuovo vino'}</span><button class="close-btn" id="form-close">✕</button></div>
    <div class="sheet-body">
      <div class="form-group"><label class="form-label">Nome vino *</label><input id="f-name" class="form-input" placeholder="es. Brunello di Montalcino" value="${formData.name||''}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Produttore</label><input id="f-producer" class="form-input" placeholder="es. Biondi-Santi" value="${formData.producer||''}"></div>
        <div class="form-group"><label class="form-label">Annata</label><input id="f-vintage" class="form-input" placeholder="2019" value="${formData.vintage||''}" maxlength="4" inputmode="numeric"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Tipologia</label>
        <div class="type-pills" id="type-pills">
          ${TYPES.map(t=>`<button class="type-pill${(formData.type||'Rosso')===t?' sel':''}" data-type="${t}">${ICONS[t]} ${t}</button>`).join('')}
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">N° bottiglie</label><input id="f-bottles" class="form-input" type="number" min="1" value="${formData.bottles||1}" inputmode="numeric"></div>
        <div class="form-group"><label class="form-label">Prezzo / bott. (€)</label><input id="f-price" class="form-input" type="number" step="0.01" min="0" placeholder="0.00" value="${formData.price||''}" inputmode="decimal"></div>
      </div>
      <div class="form-group"><label class="form-label">Valutazione personale</label>${starsWidget()}</div>
      <div class="form-group"><label class="form-label">Abbinamenti cibo</label><input id="f-pairing" class="form-input" placeholder="es. Bistecca, formaggi stagionati" value="${formData.pairing||''}"></div>
      <div class="form-group"><label class="form-label">Note di degustazione</label><textarea id="f-notes" class="form-textarea" placeholder="Colore, profumo, gusto, persistenza…">${formData.notes||''}</textarea></div>
      <div class="btn-row"><button class="btn btn-ghost" id="form-cancel">Annulla</button><button class="btn btn-primary" id="form-submit">${editId?'Salva':'Aggiungi'}</button></div>
    </div>
  </div>`;
}

function attachFormEvents(){
  attachStarEvents();
  document.getElementById('form-close').addEventListener('click', closeOverlay);
  document.getElementById('form-cancel').addEventListener('click', closeOverlay);
  document.getElementById('form-submit').addEventListener('click', submitForm);
  document.getElementById('type-pills').addEventListener('click', e=>{
    const btn=e.target.closest('[data-type]'); if(!btn) return;
    formData.type=btn.dataset.type;
    document.querySelectorAll('#type-pills .type-pill').forEach(b=>b.classList.toggle('sel',b.dataset.type===formData.type));
  });
}

async function submitForm(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ showToast('Inserisci il nome del vino'); return; }
  const w={
    name, producer:document.getElementById('f-producer').value,
    vintage:document.getElementById('f-vintage').value,
    type:formData.type||'Rosso',
    bottles:+document.getElementById('f-bottles').value||1,
    price:document.getElementById('f-price').value,
    rating:starRating,
    pairing:document.getElementById('f-pairing').value,
    notes:document.getElementById('f-notes').value,
  };
  const wasEdit=editId; closeOverlay();
  try{
    if(wasEdit){ await fbSet('wines/'+wasEdit,{...w,createdAt:formData.createdAt||Date.now()}); showToast('Modifiche salvate ✓'); }
    else{ await fbAdd(winesRef,w); showToast('Vino aggiunto ✓'); }
  }catch(e){ showToast('Errore nel salvataggio'); }
}

// ─── DRINK FORM ───────────────────────────────────────────────
function drinkSheet(id){
  const w=wines.find(x=>x.id===id); if(!w) return '';
  return `<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">🥂 Segna come bevuto</span><button class="close-btn" id="drink-close">✕</button></div>
    <div class="sheet-body">
      <div style="background:var(--paper2);border-radius:10px;padding:.85rem 1rem;margin-bottom:1rem;border-left:3px solid var(--wine)">
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600">${w.name}</div>
        <div style="font-size:13px;color:var(--muted)">${w.producer||''}${w.vintage?' · '+w.vintage:''} · ${w.bottles} bott. disponibili</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Bottiglie bevute</label><input id="d-qty" class="form-input" type="number" min="1" max="${w.bottles}" value="1" inputmode="numeric"></div>
        <div class="form-group"><label class="form-label">Data</label><input id="d-date" class="form-input" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="form-group"><label class="form-label">Note occasione</label><textarea id="d-notes" class="form-textarea" placeholder="Con chi, per quale occasione…"></textarea></div>
      <div class="btn-row"><button class="btn btn-ghost" id="drink-cancel">Annulla</button><button class="btn btn-drink" id="drink-submit">🥂 Segna bevuto</button></div>
    </div>
  </div>`;
}

// attach after render
document.getElementById('overlay-root').addEventListener('click', async e=>{
  if(e.target.id==='drink-close'||e.target.id==='drink-cancel'){ closeOverlay(); return; }
  if(e.target.id==='drink-submit'){
    const w=wines.find(x=>x.id===drinkId); if(!w) return;
    const qty=+document.getElementById('d-qty').value||1;
    const dateLabel=document.getElementById('d-date').value;
    const notes=document.getElementById('d-notes').value;
    const entry={wineId:drinkId,wineName:w.name,producer:w.producer||'',vintage:w.vintage||'',type:w.type||'Rosso',rating:w.rating||0,price:w.price||'',qty,dateLabel,notes};
    const newBottles=Math.max(0,(+w.bottles||0)-qty);
    closeOverlay();
    try{
      await push(consumedRef,{...entry,date:Date.now()});
      await fbSet('wines/'+w.id,{...w,bottles:newBottles,createdAt:w.createdAt||Date.now()});
      showToast(newBottles===0?'Ultima bottiglia bevuta 🥂':`${qty} bottiglia/e segnata/e ✓`);
    }catch(err){ showToast('Errore'); }
    return;
  }
  if(e.target.id==='detail-edit'){ openEdit(detailId); return; }
  if(e.target.id==='detail-drink'){ openDrink(detailId); return; }
  if(e.target.id==='detail-delete'){
    if(!confirm('Eliminare questo vino?')) return;
    const id=detailId; closeOverlay();
    try{ await fbDel('wines/'+id); showToast('Vino eliminato'); }catch(e){ showToast('Errore'); }
    return;
  }
  if(e.target.id==='consumed-delete'){
    if(!confirm('Rimuovere questa voce?')) return;
    const id=e.target.dataset.id; closeOverlay();
    try{ await fbDel('consumed/'+id); showToast('Voce rimossa'); }catch(e){ showToast('Errore'); }
    return;
  }
  if(e.target.id==='menu-export'){ exportJSON(); closeOverlay(); return; }
  if(e.target.id==='menu-import'){ closeOverlay(); setTimeout(importJSON,100); return; }
  if(e.target.id==='menu-pwd'){ changePwd(); return; }
  if(e.target.id==='menu-close'){ closeOverlay(); return; }
});

// ─── DETAIL SHEETS ───────────────────────────────────────────
function detailSheet(id){
  const w=wines.find(x=>x.id===id); if(!w) return '';
  const hist=consumed.filter(c=>c.wineId===id).sort((a,b)=>b.date-a.date);
  return `<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">Scheda vino</span><button class="close-btn" id="detail-close">✕</button></div>
    <div class="sheet-body">
      <div class="detail-hero">
        <div class="detail-icon">${ICONS[w.type]||'🍶'}</div>
        <div><div class="detail-name">${w.name}</div><div class="detail-producer">${w.producer||''}${w.vintage?' · Annata '+w.vintage:''}</div><div style="margin-top:6px">${starsHtml(w.rating,16)}</div></div>
      </div>
      <div class="detail-grid">
        <div class="chip"><div class="chip-label">Tipologia</div><div class="chip-val">${ICONS[w.type]} ${w.type}</div></div>
        <div class="chip"><div class="chip-label">Bottiglie</div><div class="chip-val">🍾 ${w.bottles}</div></div>
        <div class="chip"><div class="chip-label">Prezzo / bott.</div><div class="chip-val">${w.price?'€'+parseFloat(w.price).toFixed(2):'—'}</div></div>
        <div class="chip"><div class="chip-label">Valore totale</div><div class="chip-val">${w.price&&w.bottles?fmtEur(+w.price*+w.bottles):'—'}</div></div>
      </div>
      ${w.pairing?`<div class="detail-section"><div class="section-label">🍽 Abbinamenti</div><div class="detail-text">${w.pairing}</div></div>`:''}
      ${w.notes?`<div class="detail-section"><div class="section-label">📝 Note di degustazione</div><div class="detail-text">${w.notes}</div></div>`:''}
      ${hist.length?`<div class="detail-section"><div class="section-label">🥂 Storico consumi (${hist.length})</div>${hist.map(c=>`<div class="history-item"><div><div class="history-date">${c.dateLabel||fmtDate(c.date)}</div>${c.notes?`<div style="font-size:12px;color:var(--muted)">${c.notes}</div>`:''}</div><div class="history-qty">🥂 ${c.qty}</div></div>`).join('')}</div>`:''}
      <div class="btn-row">
        <button class="btn btn-danger" id="detail-delete">Elimina</button>
        <button class="btn btn-ghost" id="detail-edit">Modifica</button>
        <button class="btn btn-drink" id="detail-drink">🥂 Bevi</button>
      </div>
    </div>
  </div>`;
}

document.getElementById('overlay-root').addEventListener('click', e=>{
  if(e.target.id==='detail-close') closeOverlay();
});

function consumedDetailSheet(id){
  const w=consumed.find(x=>x.id===id); if(!w) return '';
  return `<div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">Dettaglio consumo</span><button class="close-btn" id="detail-close">✕</button></div>
    <div class="sheet-body">
      <div class="detail-hero">
        <div class="detail-icon">${ICONS[w.type]||'🍶'}</div>
        <div><div class="detail-name">${w.wineName}</div><div class="detail-producer">${w.producer||''}${w.vintage?' · '+w.vintage:''}</div><div style="margin-top:6px">${starsHtml(w.rating,16)}</div></div>
      </div>
      <div class="detail-grid">
        <div class="chip"><div class="chip-label">Bottiglie bevute</div><div class="chip-val">🥂 ${w.qty}</div></div>
        <div class="chip"><div class="chip-label">Data</div><div class="chip-val" style="font-size:14px">${w.dateLabel||fmtDate(w.date)}</div></div>
        <div class="chip"><div class="chip-label">Tipologia</div><div class="chip-val">${ICONS[w.type]||''} ${w.type}</div></div>
        <div class="chip"><div class="chip-label">Prezzo / bott.</div><div class="chip-val">${w.price?'€'+parseFloat(w.price).toFixed(2):'—'}</div></div>
      </div>
      ${w.notes?`<div class="detail-section"><div class="section-label">📝 Note occasione</div><div class="detail-text">${w.notes}</div></div>`:''}
      <div class="btn-row">
        <button class="btn btn-danger" id="consumed-delete" data-id="${w.id}">Rimuovi</button>
        <button class="btn btn-ghost" id="detail-close">Chiudi</button>
      </div>
    </div>
  </div>`;
}

// ─── MENU ────────────────────────────────────────────────────
function menuSheet(){
  return `<div class="menu-sheet">
    <div class="menu-title">Gestione cantina</div>
    <div class="menu-item" id="menu-export"><span class="menu-icon">📤</span> Esporta dati (JSON)</div>
    <div class="menu-item" id="menu-import"><span class="menu-icon">📥</span> Importa dati (JSON)</div>
    <div class="menu-item" id="menu-pwd"><span class="menu-icon">🔑</span> Cambia password</div>
    <div class="menu-item" id="menu-close"><span class="menu-icon">✕</span> Chiudi</div>
  </div>`;
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────
function exportJSON(){
  const data={wines:wines.map(({id,...w})=>w),consumed:consumed.map(({id,...c})=>c)};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`cantina_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); showToast('Export completato ✓');
}
function importJSON(){
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    const text=await f.text();
    try{
      const data=JSON.parse(text);
      const list=Array.isArray(data)?data:(data.wines||[]);
      for(const {id,...w} of list) await push(winesRef,{...w,createdAt:w.createdAt||Date.now()});
      showToast(`${list.length} vini importati ✓`);
    }catch{ showToast('File non valido'); }
  };
  input.click();
}
</script>
</body>
