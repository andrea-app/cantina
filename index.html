<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La mia Cantina">
<meta name="theme-color" content="#1a0a0a">
<title>La mia Cantina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a0a0a; --paper: #f7f2ec; --paper2: #ede6da; --paper3: #e3d9c8;
  --wine: #6b1a2a; --wine-light: #9b3a4f; --wine-pale: #f0e0e4;
  --gold: #b8922a; --gold-light: #d4ad50; --muted: #7a6a5a;
  --border: rgba(107,26,42,0.15); --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Crimson Pro', Georgia, serif; background: var(--ink); color: var(--ink); font-size: 16px; line-height: 1.5; }

/* LOCK SCREEN */
#lock-screen {
  position: fixed; inset: 0; background: var(--ink);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; padding: 2rem;
}
.lock-icon { font-size: 52px; margin-bottom: 1.5rem; }
.lock-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--paper); margin-bottom: 0.4rem; }
.lock-subtitle { font-size: 14px; color: rgba(247,242,236,0.45); margin-bottom: 2rem; }
.lock-input {
  width: 100%; max-width: 280px; padding: 13px 16px;
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  background: rgba(255,255,255,0.07); color: var(--paper);
  font-family: 'Crimson Pro', serif; font-size: 18px; text-align: center;
  letter-spacing: 0.2em; margin-bottom: 1rem;
}
.lock-input:focus { outline: none; border-color: var(--gold-light); }
.lock-btn {
  width: 100%; max-width: 280px; padding: 13px;
  background: var(--wine); color: var(--paper); border: none; border-radius: 10px;
  font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.lock-btn:active { background: var(--wine-light); }
.lock-error { font-size: 13px; color: #e57373; margin-top: 0.75rem; min-height: 20px; }
.lock-hint { font-size: 12px; color: rgba(247,242,236,0.25); margin-top: 1.5rem; text-align: center; }

/* APP */
#app { height: 100dvh; display: flex; flex-direction: column; background: var(--paper); max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }

/* HEADER */
.header { background: var(--ink); color: var(--paper); padding: 1rem 1.25rem 0.85rem; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
.app-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; letter-spacing: 0.02em; }
.app-title span { color: var(--gold-light); }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; display: inline-block; margin-left: 8px; vertical-align: middle; transition: background 0.3s; }
.sync-dot.online { background: #4caf50; }
.sync-dot.syncing { background: var(--gold-light); animation: pulse 1s infinite; }
.sync-dot.error { background: #e53935; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header-actions { display: flex; gap: 8px; }
.icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: var(--paper); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background 0.15s; }
.icon-btn:hover { background: rgba(255,255,255,0.15); }
.stats-row { display: flex; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.7rem; }
.stat { flex: 1; text-align: center; padding: 0 0.5rem; border-right: 1px solid rgba(255,255,255,0.1); }
.stat:last-child { border-right: none; }
.stat-val { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--gold-light); line-height: 1; }
.stat-label { font-size: 10px; color: rgba(247,242,236,0.5); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

/* TABS */
.tabs { display: flex; background: var(--ink); border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.tab { flex: 1; padding: 0.6rem; text-align: center; font-size: 13px; color: rgba(247,242,236,0.45); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; letter-spacing: 0.03em; }
.tab.active { color: var(--gold-light); border-bottom-color: var(--gold-light); }

/* TOOLBAR */
.toolbar { background: var(--paper2); padding: 0.6rem 1rem; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-wrap { flex: 1; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
.search { width: 100%; padding: 7px 10px 7px 32px; border: 1px solid var(--border); border-radius: 20px; background: var(--paper); font-family: 'Crimson Pro', serif; font-size: 15px; color: var(--ink); }
.search:focus { outline: none; border-color: var(--wine-light); }
.filter-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 20px; background: var(--paper); font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--ink); cursor: pointer; max-width: 110px; }
.filter-select:focus { outline: none; }
.view-toggle { display: flex; gap: 4px; }
.vbtn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); transition: all 0.15s; }
.vbtn.active { background: var(--wine); color: var(--paper); border-color: var(--wine); }

/* CONTENT */
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1rem; }

/* GRID */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.wine-card { background: var(--paper); border: 1px solid var(--border); border-radius: var(--r); padding: 0.9rem; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
.wine-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--type-color, var(--wine)); }
.wine-card:active { transform: scale(0.97); }
.card-type-badge { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; line-height: 1.2; color: var(--ink); margin-bottom: 2px; }
.card-producer { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 6px; margin-top: 6px; }

/* LIST */
.wine-list { display: flex; flex-direction: column; gap: 8px; }
.list-item { background: var(--paper); border: 1px solid var(--border); border-radius: var(--r); padding: 0.85rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.15s; position: relative; overflow: hidden; }
.list-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--type-color, var(--wine)); }
.list-item:active { transform: scale(0.98); }
.list-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--paper2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.list-main { flex: 1; min-width: 0; }
.list-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-sub { font-size: 13px; color: var(--muted); }
.list-right { text-align: right; flex-shrink: 0; }

/* CONSUMED BADGE */
.consumed-card { opacity: 0.75; }
.consumed-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* FAB */
.fab { position: absolute; bottom: 1.25rem; right: 1.25rem; width: 54px; height: 54px; border-radius: 50%; background: var(--wine); color: var(--paper); border: none; cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(107,26,42,0.4); transition: transform 0.15s; z-index: 10; }
.fab:active { transform: scale(0.92); }

/* EMPTY */
.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty-icon { font-size: 56px; margin-bottom: 1rem; opacity: 0.5; }
.empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--ink); margin-bottom: 0.5rem; }

/* OVERLAY / SHEET */
.overlay { position: fixed; inset: 0; background: rgba(26,10,10,0.6); z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } }
.sheet { background: var(--paper); border-radius: 20px 20px 0 0; max-height: 92dvh; overflow-y: auto; animation: slideUp 0.25s cubic-bezier(0.34,1.2,0.64,1); }
@keyframes slideUp { from { transform: translateY(100%); } }
.sheet-handle { width: 36px; height: 4px; background: var(--paper3); border-radius: 2px; margin: 10px auto 0; }
.sheet-header { padding: 1rem 1.25rem 0.75rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.sheet-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
.close-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--paper2); border: none; cursor: pointer; font-size: 16px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
.sheet-body { padding: 1rem 1.25rem 2rem; }

/* FORM */
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--paper2); font-family: 'Crimson Pro', serif; font-size: 16px; color: var(--ink); appearance: none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--wine-light); background: var(--paper); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.type-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.type-pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--paper2); font-family: 'Crimson Pro', serif; font-size: 14px; cursor: pointer; transition: all 0.15s; color: var(--ink); }
.type-pill.selected { background: var(--wine); color: var(--paper); border-color: var(--wine); }
.star-row { display: flex; gap: 6px; }
.star-btn { font-size: 28px; background: none; border: none; cursor: pointer; color: var(--paper3); transition: color 0.1s; padding: 0; line-height: 1; }
.star-btn.lit { color: var(--gold); }

/* BUTTONS */
.btn-row { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
.btn { flex: 1; padding: 12px 8px; border-radius: 10px; font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; letter-spacing: 0.02em; white-space: nowrap; min-width: 0; }
.btn-primary { background: var(--wine); color: var(--paper); }
.btn-primary:active { background: var(--wine-light); }
.btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
.btn-danger { background: transparent; color: #b33; border-color: rgba(180,0,0,0.2); }
.btn-drink { background: transparent; color: var(--gold); border-color: rgba(184,146,42,0.3); }

/* DETAIL */
.detail-hero { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
.detail-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--wine-pale); display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; }
.detail-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; line-height: 1.2; margin-bottom: 3px; }
.detail-producer { font-size: 15px; color: var(--muted); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.detail-chip { background: var(--paper2); border-radius: 8px; padding: 0.6rem 0.8rem; }
.detail-chip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; }
.detail-chip-val { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; }
.detail-section { margin-bottom: 1rem; }
.detail-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px; }
.detail-text { background: var(--paper2); border-radius: 8px; padding: 0.75rem 0.9rem; font-size: 15px; line-height: 1.6; }

/* CONSUMED HISTORY */
.history-item { background: var(--paper2); border-radius: 8px; padding: 0.7rem 0.9rem; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.history-date { font-size: 13px; color: var(--muted); }
.history-qty { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--wine); }

/* MENU */
.menu-overlay { position: fixed; inset: 0; background: rgba(26,10,10,0.5); z-index: 60; display: flex; flex-direction: column; justify-content: flex-end; animation: fadeIn 0.15s ease; }
.menu-sheet { background: var(--paper); border-radius: 20px 20px 0 0; padding: 1rem 1.25rem 2rem; animation: slideUp 0.2s ease; }
.menu-title { font-family: 'Cormorant Garamond', serif; font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); text-align: center; margin-bottom: 1rem; }
.menu-item { display: flex; align-items: center; gap: 12px; padding: 0.85rem 0.5rem; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 17px; color: var(--ink); }
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: var(--paper2); border-radius: 8px; }
.menu-icon { font-size: 20px; width: 28px; text-align: center; }

/* TOAST */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 200; animation: toastIn 0.2s ease, toastOut 0.3s ease 2.2s forwards; white-space: nowrap; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity: 0; } }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-icon">🍷</div>
  <div class="lock-title">La mia Cantina</div>
  <div class="lock-subtitle">Inserisci la password per accedere</div>
  <input class="lock-input" type="password" id="lock-pwd" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPwd()">
  <button class="lock-btn" onclick="checkPwd()">Entra</button>
  <div class="lock-error" id="lock-err"></div>
  <div class="lock-hint">Prima volta? La password predefinita è: <strong style="color:rgba(255,255,255,0.4)">cantina</strong></div>
</div>

<!-- APP -->
<div id="app" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCS2TOh-IRFlW-kINdXkfSvftx5wYWnwrc",
  authDomain: "cantina-andrea.firebaseapp.com",
  databaseURL: "https://cantina-andrea-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cantina-andrea",
  storageBucket: "cantina-andrea.firebasestorage.app",
  messagingSenderId: "372812766335",
  appId: "1:372812766335:web:dad2b9643e88770dacf34a"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const winesRef = ref(db, 'wines');
const consumedRef = ref(db, 'consumed');
const settingsRef = ref(db, 'settings');

// ── PASSWORD ──────────────────────────────────────────────
const DEFAULT_PWD = 'cantina';
let storedHash = localStorage.getItem('cantina_pwd_hash') || simpleHash(DEFAULT_PWD);
let sessionOk = sessionStorage.getItem('cantina_auth') === '1';

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return String(h);
}

window.checkPwd = function() {
  const v = document.getElementById('lock-pwd').value;
  if (simpleHash(v) === storedHash) {
    sessionStorage.setItem('cantina_auth', '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = '';
    startApp();
  } else {
    document.getElementById('lock-err').textContent = 'Password errata. Riprova.';
    document.getElementById('lock-pwd').value = '';
  }
};

window.changePwd = function() {
  const np = prompt('Nuova password (min 4 caratteri):');
  if (!np || np.length < 4) { showToast('Password troppo corta'); return; }
  const np2 = prompt('Ripeti la nuova password:');
  if (np !== np2) { showToast('Le password non coincidono'); return; }
  storedHash = simpleHash(np);
  localStorage.setItem('cantina_pwd_hash', storedHash);
  showToast('Password aggiornata ✓');
  closeOverlay();
};

if (sessionOk) {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
}

// ── STATE ─────────────────────────────────────────────────
const TYPES = ['Rosso','Bianco','Rosé','Bollicine','Passito','Altro'];
const TYPE_ICONS = {Rosso:'🍷',Bianco:'🥂',Rosé:'🌸',Bollicine:'🍾',Passito:'🍯',Altro:'🍶'};
const TYPE_COLORS = {Rosso:'#6b1a2a',Bianco:'#b8922a',Rosé:'#c45a7e',Bollicine:'#2a5a8b',Passito:'#4a7a2a',Altro:'#5a4a3a'};

let wines = [], consumed = [];
let view = localStorage.getItem('cantina_view')||'grid';
let filterType = '', search = '';
let activeTab = 'cantina'; // cantina | bevuti
let mode = 'list';
let editId = null, detailId = null, drinkId = null;
let formData = {}, drinkData = {};
let hoverStar = 0;
let syncStatus = 'syncing';

function saveView(v){ localStorage.setItem('cantina_view', v); }
function totalBottles(){ return wines.reduce((s,w)=>s+(parseInt(w.bottles)||0),0); }
function avgRating(){ const r=wines.filter(w=>w.rating>0); return r.length?(r.reduce((s,w)=>s+w.rating,0)/r.length).toFixed(1):'—'; }
function totalValue(){ return wines.reduce((s,w)=>s+(parseFloat(w.price)||0)*(parseInt(w.bottles)||0),0); }
function fmtEur(n){ return '€'+(n||0).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}); }

function filtered(){
  return wines.filter(w=>{
    const q=search.toLowerCase();
    const ms=!q||(w.name||'').toLowerCase().includes(q)||(w.producer||'').toLowerCase().includes(q)||(w.vintage||'').includes(q);
    const mt=!filterType||w.type===filterType;
    return ms&&mt;
  });
}

function filteredConsumed(){
  return consumed.filter(w=>{
    const q=search.toLowerCase();
    const ms=!q||(w.wineName||'').toLowerCase().includes(q)||(w.producer||'').toLowerCase().includes(q);
    const mt=!filterType||w.type===filterType;
    return ms&&mt;
  });
}

function starsHtml(n, size=14){
  let s='';
  for(let i=1;i<=5;i++) s+=`<span style="color:${i<=n?'#b8922a':'#d3c9b8'};font-size:${size}px">★</span>`;
  return s;
}

function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

// ── FIREBASE ──────────────────────────────────────────────
onValue(winesRef, snap => {
  const data=snap.val();
  wines=data?Object.entries(data).map(([id,w])=>({...w,id})):[];
  wines.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  syncStatus='online'; render();
}, ()=>{ syncStatus='error'; render(); showToast('Errore di connessione'); });

onValue(consumedRef, snap => {
  const data=snap.val();
  consumed=data?Object.entries(data).map(([id,w])=>({...w,id})):[];
  consumed.sort((a,b)=>(b.date||0)-(a.date||0));
  render();
});

async function addWine(w){ syncStatus='syncing'; updateSyncDot(); await push(winesRef,{...w,createdAt:Date.now()}); }
async function updateWine(id,w){ syncStatus='syncing'; updateSyncDot(); await set(ref(db,'wines/'+id),{...w,createdAt:w.createdAt||Date.now()}); }
async function deleteWineDB(id){ syncStatus='syncing'; updateSyncDot(); await remove(ref(db,'wines/'+id)); }
async function addConsumed(entry){ await push(consumedRef,{...entry,date:Date.now()}); }
async function deleteConsumedDB(id){ await remove(ref(db,'consumed/'+id)); }

function updateSyncDot(){ const dot=document.querySelector('.sync-dot'); if(dot) dot.className='sync-dot '+syncStatus; }

// ── NAVIGATION ────────────────────────────────────────────
function openAdd(){ formData={rating:0,type:'Rosso',bottles:1}; editId=null; mode='form'; render(); }
function openEdit(id){ const w=wines.find(x=>x.id===id); formData={...w}; editId=id; mode='form'; detailId=null; render(); }
function openDetail(id){ detailId=id; mode='detail'; render(); }

// ── FORM SUBMIT ───────────────────────────────────────────
async function submitForm(){
  const name=(document.getElementById('f-name')||{}).value||'';
  if(!name.trim()){ showToast('Inserisci il nome del vino'); return; }
  const w={
    name:name.trim(),
    producer:(document.getElementById('f-producer')||{}).value||'',
    vintage:(document.getElementById('f-vintage')||{}).value||'',
    type:formData.type||'Rosso',
    bottles:parseInt((document.getElementById('f-bottles')||{}).value)||1,
    price:(document.getElementById('f-price')||{}).value||'',
    rating:formData.rating||0,
    pairing:(document.getElementById('f-pairing')||{}).value||'',
    notes:(document.getElementById('f-notes')||{}).value||'',
  };
  const wasEdit=editId;
  mode='list'; editId=null; render();
  try{
    if(wasEdit){ await updateWine(wasEdit,{...w,createdAt:formData.createdAt}); showToast('Modifiche salvate ✓'); }
    else{ await addWine(w); showToast('Vino aggiunto ✓'); }
  }catch(e){ showToast('Errore nel salvataggio'); }
}

async function submitDrink(){
  const w=wines.find(x=>x.id===drinkId); if(!w) return;
  const qty=parseInt((document.getElementById('d-qty')||{}).value)||1;
  const dateVal=(document.getElementById('d-date')||{}).value||new Date().toISOString().slice(0,10);
  const notesVal=(document.getElementById('d-notes')||{}).value||'';
  const entry={
    wineId:drinkId, wineName:w.name, producer:w.producer||'',
    vintage:w.vintage||'', type:w.type||'Rosso',
    rating:w.rating||0, price:w.price||'',
    qty, dateLabel:dateVal, notes:notesVal,
  };
  const newBottles=Math.max(0,(parseInt(w.bottles)||0)-qty);
  mode='list'; drinkId=null; render();
  try{
    await addConsumed(entry);
    await updateWine(w.id,{...w,bottles:newBottles});
    if(newBottles===0){
      showToast('Ultima bottiglia bevuta! Vino spostato nei Bevuti 🥂');
    } else {
      showToast(`${qty} bottiglia/e segnata/e come bevuta/e ✓`);
    }
  }catch(e){ showToast('Errore'); }
}

async function deleteWine(id){
  if(!confirm('Eliminare questo vino dalla cantina?')) return;
  mode='list'; detailId=null; render();
  try{ await deleteWineDB(id); showToast('Vino eliminato'); }
  catch(e){ showToast('Errore'); }
}

async function deleteConsumed(id){
  if(!confirm('Rimuovere questa voce dallo storico?')) return;
  mode='list'; detailId=null; render();
  try{ await deleteConsumedDB(id); showToast('Voce rimossa'); }
  catch(e){ showToast('Errore'); }
}

window.submitForm=submitForm; window.submitDrink=submitDrink;
window.deleteWine=deleteWine; window.deleteConsumed=deleteConsumed;

// ── EXPORT / IMPORT ───────────────────────────────────────
function exportJSON(){
  const data={wines:wines.map(({id,...w})=>w),consumed:consumed.map(({id,...c})=>c)};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`cantina_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); showToast('Export completato ✓');
}
function importJSON(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const list=Array.isArray(data)?data:(data.wines||[]);
        let added=0;
        for(const w of list){ const {id,...wine}=w; await push(winesRef,{...wine,createdAt:wine.createdAt||Date.now()}); added++; }
        showToast(`${added} vini importati ✓`);
      }catch(e){ showToast('File non valido'); }
    };
    r.readAsText(f);
  };
  input.click();
}
window.exportJSON=exportJSON; window.importJSON=importJSON;
